<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sum Calculator Service</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; text-align: center; background-color: #f4f7f6; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { padding: 10px; margin: 10px; width: 80px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 4px; }
        #result { margin-top: 20px; padding: 15px; font-weight: bold; border-radius: 4px; min-height: 20px; }
        .error { background-color: #ffebee; color: #c62828; }
        .success { background-color: #e8f5e9; color: #2e7d32; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sum Calculator</h1>
        <input type="number" id="numberA" placeholder="A"> + 
        <input type="number" id="numberB" placeholder="B">
        <br>
        <button onclick="calculateSum()">Calculate Sum</button>
        <div id="result"></div>
    </div>

    <script>
        async function calculateSum() {
            const a = document.getElementById('numberA').value;
            const b = document.getElementById('numberB').value;
            const resultDiv = document.getElementById('result');

            if (a === '' || b === '') {
                resultDiv.className = 'error';
                resultDiv.textContent = 'Please enter both numbers';
                return;
            }

            const url = `https://project-c04r.onrender.com/sum?a=${encodeURIComponent(a)}&b=${encodeURIComponent(b)}`;

            resultDiv.className = '';
            resultDiv.textContent = 'Processing...';

            try {
                const response = await fetch(url);
                const data = await response.json();

                if (response.ok) {
                    resultDiv.className = 'success';
                    resultDiv.textContent = `Result: ${data.sum}`;
                } else {
                    resultDiv.className = 'error';
                    resultDiv.textContent = data.error;
                }
            } catch (error) {
                resultDiv.className = 'error';
                resultDiv.textContent = 'Connection error. Check if the server is Live.';
            }
        }
    </script>
</body>
</html>
