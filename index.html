<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sum Calculator Client</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            text-align: center;
        }
        input, button {
            padding: 10px;
            margin: 5px;
            font-size: 16px;
        }
        #result {
            margin-top: 20px;
            font-weight: bold;
            padding: 10px;
            border-radius: 5px;
        }
        .error {
            color: white;
            background-color: #ff4d4d;
        }
        .success {
            color: white;
            background-color: #2ecc71;
        }
    </style>
</head>
<body>
    <h1>Sum Calculator Service</h1>
    <div>
        <label for="numberA">Enter first number (a):</label>
        <input type="number" id="numberA" placeholder="e.g., 1" required>
    </div>
    <div>
        <label for="numberB">Enter second number (b):</label>
        <input type="number" id="numberB" placeholder="e.g., 1" required>
    </div>
    <button onclick="calculateSum()">Calculate Sum</button>
    <div id="result"></div>

    <script>
        async function calculateSum() {
            const a = document.getElementById('numberA').value;
            const b = document.getElementById('numberB').value;
            const resultDiv = document.getElementById('result');

            if (a === '' || b === '') {
                resultDiv.className = 'error';
                resultDiv.textContent = 'Please enter both numbers';
                return;
            }

            // ВАЖНО: Замените 'ВАШ-АДРЕС-СЕРВЕРА' на ссылку из Render (Web Service)
            // Пример: https://sum-server-123.onrender.com
            const baseUrl = 'https://ВАШ-АДРЕС-СЕРВЕРА.onrender.com'; 
            
            const url = `${baseUrl}/sum?a=${encodeURIComponent(a)}&b=${encodeURIComponent(b)}`;

            resultDiv.className = '';
            resultDiv.textContent = 'Connecting to server... (this may take 30s if server is sleeping)';

            try {
                const response = await fetch(url);
                const data = await response.json();

                if (response.ok) {
                    resultDiv.className = 'success';
                    resultDiv.textContent = `Sum of ${data.a} and ${data.b} is ${data.sum}`;
                } else {
                    resultDiv.className = 'error';
                    resultDiv.textContent = data.error || 'An error occurred';
                }
            } catch (error) {
                resultDiv.className = 'error';
                resultDiv.textContent = 'Failed to connect to the server. Check your URL or wait for server to wake up.';
                console.error('Error:', error);
            }
        }
    </script>
</body>
</html>
